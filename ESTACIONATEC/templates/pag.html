<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estacionatec Alumnos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
    }

    header {
      background-color: #e9c4f7;
      padding: 15px;
      font-size: 28px;
      font-weight: bold;
      border: 3px solid #8a2be2;
      border-bottom: none;
      position: relative;
      color: #333;
    }

    header img {
      position: absolute;
      right: 20px;
      top: 10px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
    }

    .main {
      display: flex;
    }

    /* Menú lateral */
    .sidebar {
      width: 200px;
      background-color: #f0c6f5;
      padding-top: 20px;
      border-right: 1px solid #ccc;
      border-bottom-left-radius: 30px;
      height: calc(100vh - 70px);
    }

    .sidebar button {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 10px;
      border: none;
      border-radius: 20px;
      background-color: #f8dff9;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .sidebar button:hover {
      background-color: #e5b7f0;
    }

    .sidebar button.active {
      background-color: #d892f0;
      font-weight: bold;
    }

    /* Contenido */
    .content {
      flex: 1;
      padding: 20px;
    }

    .content h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .payment-list {
      width: 80%;
      margin: 0 auto;
    }

    .payment-item {
      background-color: #d3d3d3;
      border-radius: 20px;
      padding: 12px 20px;
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
    }

    .payment-item:nth-child(even) {
      background-color: #e5e5e5;
    }

    .print-icon {
      width: 30px;
      height: 30px;
      background-color: #333;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .print-icon::before {
      content: "\1F5B6"; /* Unicode para ícono de impresora */
      color: white;
      font-size: 20px;
    }
  </style>
</head>
<body>
  <header>
    Estacionatec Alumnos
    <!-- Imagen personalizada -->
    <img src="{{ url_for('static', filename='img1.jpg') }}" alt="logo">
  </header>

  <div class="main">
    <!-- Menú lateral -->
    <div class="sidebar">
      <button>Perfil</button>
      <button class="active">Historial de pagos</button>
      <button>Carga de Vehículo</button>
      <button>Pago de Tarjeton</button>
      <button>Vaucher</button>
      <button>Cerrar Sesión</button>
    </div>

    <!-- Contenido -->
    <div class="content">
      <h2>Historial de Pagos</h2>
      <div class="payment-list">
        <div class="payment-item">
          Enero-Junio 2023
          <div class="print-icon"></div>
        </div>
        <div class="payment-item">
          Agosto-Diciembre 2023
          <div class="print-icon"></div>
        </div>
        <div class="payment-item">
          Enero-Junio 2024
          <div class="print-icon"></div>
        </div>
        <div class="payment-item">
          Agosto-Diciembre 2024
          <div class="print-icon"></div>
        </div>
        <div class="payment-item">
          Enero-Junio 2025
          <div class="print-icon"></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
