<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estacionatec Docentes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
    }

    header {
      background-color: #e9c4f7;
      padding: 15px;
      font-size: 28px;
      font-weight: bold;
      border: 3px solid #8a2be2;
      border-bottom: none;
      position: relative;
      color: #333;
    }

    header img {
      position: absolute;
      right: 20px;
      top: 10px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
    }

    .main {
      display: flex;
    }

    /* Menú lateral */
    .sidebar {
      width: 200px;
      background-color: #f0c6f5;
      padding-top: 20px;
      border-right: 1px solid #ccc;
      border-bottom-left-radius: 30px;
      height: calc(100vh - 70px);    
}

    .sidebar button {
      display: block;
      width: 90%;
      margin: 10px auto;
      padding: 10px;
      border: none;
      border-radius: 20px;
      background-color: #f8dff9;
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .sidebar button:hover {
      background-color: #e5b7f0;
    }

    .sidebar button.active {
      background-color: #d892f0;
      font-weight: bold;
    }

    /* Contenido */
    .content {
      flex: 1;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .content img {
      width: 200px;
      height: 200px;
      margin-bottom: 15px;
    }

    .info {
      text-align: center;
      font-size: 16px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <header>
    Estacionatec Docentes
    <img src=<img src="{{ url_for('static', filename='img1.jpg') }}" alt="logo">
  </header>

  <div class="main">
    <!-- Menú lateral -->
    <div class="sidebar">
      <button class="active">Perfil</button>
      <button>Historial de pagos</button>
      <button>Carga de Vehículo</button>
      <button>Pago de Tarjeton</button>
      <button>Vaucher</button>
      <button>Cerrar Sesión</button>
    </div>

    <!-- Contenido -->
    <div class="content">
      <!-- Ícono de usuario centrado -->
      <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" alt="Foto de perfil">
      
      <!-- Información debajo -->
      <div class="info">
        <p><b>RFC:</b> DOC123456789</p>
        <p><b>Departamento:</b> Sistemas</p>
        <p><b>Nombre:</b> Juanito Pérez</p>
      </div>
    </div>
  </div>
</body>
</html>
