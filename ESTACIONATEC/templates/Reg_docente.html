<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Estacionatec Docentes</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #e9c4f7;
      padding: 15px;
      text-align: left;
      font-size: 28px;
      font-weight: bold;
      color: #333;
      border: 3px solid #8a2be2;
      border-bottom: none;
      position: relative;
    }

    header img {
      position: absolute;
      right: 20px;
      top: 10px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
    }

    .container {
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .form-box {
      background-color: #f0c6f5;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      text-align: left;
      font-size: 14px;
    }

    .form-box h2 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 10px 0 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 20px;
      border: none;
      margin-bottom: 15px;
      background-color: #f8dff9;
    }

    .form-box p {
      text-align: center;
    }

    .form-box a {
      color: #4a00e0;
      text-decoration: none;
      font-weight: bold;
    }

    .form-box a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    Estacionatec Docentes
    <img src="https://cdn-icons-png.flaticon.com/512/854/854905.png" alt="Parking Logo">
  </header>

  <div class="container">
    <div class="form-box">
      <h2>Registrarse</h2>
      <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" placeholder="ingresa tu nombre completo">

        <label for="rfc">RFC</label>
        <input type="text" id="rfc" placeholder="ingresa tu RFC">

        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="juan@example.com">

        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="ingresa tu contraseña">

        <label for="password2">Contraseña</label>
        <input type="password" id="password2" placeholder="confirma tu contraseña">
      </form>
      <p>¿Ya tienes cuenta? <a href="#">Iniciar Sesión</a></p>
    </div>
  </div>
</body>
</html>
